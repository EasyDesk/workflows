name: Continuous Integration

on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        required: true
      warnings-as-errors:
        type: boolean
        required: false
        default: false
      tests:
        type: string
        required: false
        description: >
          JSON array of test strings.
          Each string: <project_path> [optional_args].
          Example: |
            tests:
              - tests/Project.UnitTests/Project.UnitTests.csproj
              - "tests/My Test Project/Project.IntegrationTests.csproj" --filter "Category=Integration"
        default: '[]'
      build-artifact-name:
        type: string
        required: true
      project:
        type: string
        required: true
      submodules:
        description: >
          true: checkout submodules
          false: don't checkout submodules
          recursive: recursively checkout submodules
        required: false
        default: 'false'
        type: string
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}
      should-release:
        value: ${{ jobs.build.outputs.should-release }}
      is-prerelease:
        value: ${{ jobs.build.outputs.is-prerelease }}
      major:
        value: ${{ jobs.build.outputs.major }}
      minor:
        value: ${{ jobs.build.outputs.minor }}
      patch:
        value: ${{ jobs.build.outputs.patch }}


defaults:
  run:
    shell: bash


env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      should-release: ${{ steps.semver.outputs.should-release }}
      is-prerelease: ${{ steps.semver.outputs.is-github-prerelease }}
      major: ${{ steps.semver.outputs.major }}
      minor: ${{ steps.semver.outputs.minor }}
      patch: ${{ steps.semver.outputs.patch }}
    steps:
      - id: semver
        name: Checkout
        uses: EasyDesk/action-semver-checkout@v1
        with:
          submodules: ${{ inputs.submodules }}
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Build
        uses: EasyDesk/action-dotnet-build@v1
        with:
          path: ${{ inputs.project }}
          warnings-as-errors: ${{ inputs.warnings-as-errors }}
      - name: Create temporary directory
        id: tempdir
        run: |
          echo "tempdir=$(mktemp -d)" >> $GITHUB_OUTPUT
      - name: Publish
        uses: EasyDesk/action-dotnet-publish@v1
        with:
          path: ${{ inputs.project }}
          output-dir: ${{ steps.tempdir.outputs.tempdir }}
          skip-build: false
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ steps.tempdir.outputs.tempdir }}

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.tests != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(inputs.tests) }}
    steps:
      - name: Checkout
        uses: EasyDesk/action-semver-checkout@v1
        with:
          submodules: ${{ inputs.submodules }}
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.build-artifact-name }}
          path: build-artifact
      - name: Resolve Test Project Path
        id: test-project
        run: |
          value='${{ matrix.test }}'
          if [[ "$value" =~ ^\"([^\"]+)\" ]]; then
            project="${BASH_REMATCH[1]}"
          else
            project="${value%% *}"
          fi
          echo "project=$project" >> "$GITHUB_OUTPUT"
      - name: Build Test Project
        uses: EasyDesk/action-dotnet-build@v1
        with:
          path: ${{ steps.test-project.outputs.project }}
          warnings-as-errors: ${{ inputs.warnings-as-errors }}
      - name: Run Tests
        uses: EasyDesk/action-dotnet-test@v4
        with:
          test-args: --project ${{ matrix.test }}
          skip-build: true
