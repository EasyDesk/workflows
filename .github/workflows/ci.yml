name: Workflow CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - "**"

jobs:
  test-sample:
    name: Test Sample
    uses: ./.github/workflows/sample-ci.yml

  release:
    name: GitHub Release
    needs: test-sample
    if: ${{ needs.test-sample.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: false
      group: workflow-ci-${{ github.repository }}-${{ github.ref }}
    steps:
      - name: Remove Existing Release For Tag
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              core.info(`Deleting existing release ${release.id} for tag ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}`);
                return;
              }
              throw error;
            }
      - name: Release
        uses: EasyDesk/action-semver-release@v1
        with:
          version: ${{ needs.test-sample.outputs.version }}
          prerelease: ${{ contains(needs.test-sample.outputs.version, '-') }}
