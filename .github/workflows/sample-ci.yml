name: Sample CI

on:
  workflow_call:
    outputs:
      released:
        description: Whether microservice CI/CD produced a release
        value: ${{ jobs.build.outputs.released }}
      version:
        description: Release version from microservice CI/CD
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    uses: ./.github/workflows/microservice-cicd.yml
    with:
      dotnet-version: 10.x
      warnings-as-errors: true
      main-project: sample/src/SampleApi/SampleApi.csproj
      dockerfile: sample/Dockerfile
      image-name: sample-api
      openapi-command: cat openapi.json
      tests: |
        [
          "sample/tests/SampleApi.UnitTests/SampleApi.UnitTests.csproj",
          "sample/tests/SampleApi.IntegrationTests/SampleApi.IntegrationTests.csproj"
        ]
