name: Sample CI

on:
  workflow_call:

jobs:
  build:
    uses: ./.github/workflows/microservice-cicd.yml
    with:
      dotnet-version: 10.x
      warnings-as-errors: true
      main-project: sample/src/SampleApi/SampleApi.csproj
      tests-root: sample
      tests: |
        [
          "tests/SampleApi.UnitTests/SampleApi.UnitTests.csproj",
          "tests/SampleApi.IntegrationTests/SampleApi.IntegrationTests.csproj"
        ]
