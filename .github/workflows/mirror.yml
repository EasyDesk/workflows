name: Repository Mirror

on:
  workflow_call:
    inputs:
      destination-url:
        description: Optional HTTPS or SSH URL of the destination repository. Leave blank to run integration test mode.
        required: false
        default: ""
        type: string
      source-url:
        description: Optional source URL. Defaults to the current GitHub repository URL.
        required: false
        default: ${{ github.server_url }}/${{ github.repository }}.git
        type: string
    secrets:
      destination-token:
        description: Token/password for HTTPS mirroring.
        required: false
      destination-username:
        description: Username for HTTPS mirroring (defaults to oauth2).
        required: false
      destination-ssh-private-key:
        description: Private SSH key for SSH mirroring.
        required: false

defaults:
  run:
    shell: bash

jobs:
  mirror:
    name: Mirror Git Refs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      gitserver:
        image: ${{ (inputs.destination-url == '') && 'rockstorm/git-server:latest' || '' }}
        env:
          GIT_PASSWORD: mirror-ci-password
          SSH_AUTHORIZED_KEYS_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.github/workflows/mirror.yml
          MIRROR_TEST_PUBLIC_KEY: >-
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPHQRk+eQPnM/9jBwEH+qDQV2ZiIlVbudvy48OT6Qsh7 lucad@DESKTOP-UAQ49HJ
          REPOSITORIES_HOME_LINK: /srv/git
        ports:
          - 2222:22
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail

          destination_url='${{ inputs.destination-url }}'
          effective_destination_url="$destination_url"

          if [[ -z "$destination_url" ]]; then
            destination_type="ssh"
            effective_destination_url="ssh://git@127.0.0.1:2222/home/git/mirror.git"
            test_mode="true"
          elif [[ "$destination_url" =~ ^https?:// ]]; then
            destination_type="https"
            test_mode="false"
          elif [[ "$destination_url" =~ ^ssh:// || "$destination_url" =~ ^git@ ]]; then
            destination_type="ssh"
            test_mode="false"
          else
            echo "Unable to detect destination transport from destination-url." >&2
            echo "Use a HTTPS URL (https://...) or SSH URL (ssh://... or git@...:...)." >&2
            exit 1
          fi

          if [[ "$destination_type" == "https" && "$test_mode" != "true" && -z '${{ secrets.destination-token }}' ]]; then
            echo "destination-token secret is required for HTTPS mirroring." >&2
            exit 1
          fi

          if [[ "$destination_type" == "ssh" && "$test_mode" != "true" && -z '${{ secrets.destination-ssh-private-key }}' ]]; then
            echo "destination-ssh-private-key secret is required for SSH mirroring." >&2
            exit 1
          fi

          echo "destination_type=$destination_type" >> "$GITHUB_OUTPUT"
          echo "destination_url=$effective_destination_url" >> "$GITHUB_OUTPUT"
          echo "test_mode=$test_mode" >> "$GITHUB_OUTPUT"

      - name: Bootstrap test git server
        id: bootstrap_test_server
        if: ${{ steps.validate.outputs.test_mode == 'true' }}
        run: |
          set -euo pipefail

          test_key_path="$RUNNER_TEMP/mirror-test-key"
          printf '%s\n' \
            '-----BEGIN OPENSSH PRIVATE KEY-----' \
            'b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW' \
            'QyNTUxOQAAACDx0EZPnkD5zP/YwcBB/qg0FdmYiJVW7nb8uPDk+kLIewAAAJgMcWKzDHFi' \
            'swAAAAtzc2gtZWQyNTUxOQAAACDx0EZPnkD5zP/YwcBB/qg0FdmYiJVW7nb8uPDk+kLIew' \
            'AAAEDWIiSq9zNd3+pQiDnL9KeJqup+Zcg78nxvXmFIeJNDOfHQRk+eQPnM/9jBwEH+qDQV' \
            '2ZiIlVbudvy48OT6Qsh7AAAAFWx1Y2FkQERFU0tUT1AtVUFRNDlISg==' \
            '-----END OPENSSH PRIVATE KEY-----' \
            > "$test_key_path"
          chmod 600 "$test_key_path"

          for attempt in {1..30}; do
            if ssh-keyscan -p 2222 127.0.0.1 >/dev/null 2>&1; then
              break
            fi

            if [[ "$attempt" -eq 30 ]]; then
              echo "Test git server did not become ready in time." >&2
              exit 1
            fi

            sleep 1
          done

          ssh -i "$test_key_path" \
            -p 2222 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            git@127.0.0.1 \
            'git-init --bare mirror.git'

          output_delimiter="EOF_$(date +%s%N)"
          {
            echo "test_ssh_private_key<<$output_delimiter"
            cat "$test_key_path"
            echo "$output_delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Mirror refs
        env:
          DESTINATION_URL: ${{ steps.validate.outputs.destination_url }}
          DESTINATION_TYPE: ${{ steps.validate.outputs.destination_type }}
          DESTINATION_USERNAME: ${{ secrets.destination-username }}
          DESTINATION_TOKEN: ${{ secrets.destination-token }}
          DESTINATION_SSH_PRIVATE_KEY: ${{ steps.bootstrap_test_server.outputs.test_ssh_private_key || secrets.destination-ssh-private-key }}
          SOURCE_URL_INPUT: ${{ inputs.source-url }}
          SOURCE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          destination_url="$DESTINATION_URL"
          destination_type="$DESTINATION_TYPE"
          mirror_username="$DESTINATION_USERNAME"
          destination_token="$DESTINATION_TOKEN"
          destination_ssh_private_key="$DESTINATION_SSH_PRIVATE_KEY"
          source_auth_token="$SOURCE_AUTH_TOKEN"

          source_url="$SOURCE_URL_INPUT"
          if [[ -z "$source_url" ]]; then
            source_url="${GITHUB_SERVER_URL%/}/${GITHUB_REPOSITORY}.git"
          fi

          mirror_dir="$RUNNER_TEMP/repo-mirror.git"
          rm -rf "$mirror_dir"
          git init --bare "$mirror_dir"

          github_server_url_with_slash="${GITHUB_SERVER_URL%/}/"
          github_basic_auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$source_auth_token" | base64 | tr -d '\n')"
          git -C "$mirror_dir" remote add source "$source_url"

          git -C "$mirror_dir" \
            -c "http.${github_server_url_with_slash}.extraheader=${github_basic_auth_header}" \
            fetch --prune source '+refs/*:refs/*'

          git -C "$mirror_dir" remote add destination "$destination_url"

          if [[ "$destination_type" == "ssh" ]]; then
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh

            ssh_host=""
            ssh_port="22"
            if [[ "$destination_url" =~ ^ssh://([^/@]+@)?([^/:]+)(:([0-9]+))?/ ]]; then
              ssh_host="${BASH_REMATCH[2]}"
              if [[ -n "${BASH_REMATCH[4]}" ]]; then
                ssh_port="${BASH_REMATCH[4]}"
              fi
            elif [[ "$destination_url" =~ ^git@([^:]+): ]]; then
              ssh_host="${BASH_REMATCH[1]}"
            fi

            if [[ -z "$ssh_host" ]]; then
              echo "Unable to parse SSH host from destination-url." >&2
              exit 1
            fi

            ssh-keyscan -p "$ssh_port" -H "$ssh_host" > ~/.ssh/known_hosts 2>/dev/null

            chmod 600 ~/.ssh/known_hosts

            if [[ -z "$destination_ssh_private_key" ]]; then
              echo "destination-ssh-private-key secret is required for SSH mirroring." >&2
              exit 1
            fi

            eval "$(ssh-agent -s)"
            printf '%s\n' "$destination_ssh_private_key" | tr -d '\r' | ssh-add -
            git -C "$mirror_dir" push --mirror destination
            ssh-agent -k >/dev/null
          else
            if [[ -z "$mirror_username" ]]; then
              mirror_username="oauth2"
            fi

            echo "::add-mask::$destination_token"
            askpass_script="$RUNNER_TEMP/git-askpass.sh"
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'case "$1" in' \
              '  *sername*) echo "$MIRROR_USERNAME" ;;' \
              '  *assword*) echo "$MIRROR_PASSWORD" ;;' \
              '  *) echo "" ;;' \
              'esac' \
              > "$askpass_script"
            chmod 700 "$askpass_script"

            GIT_TERMINAL_PROMPT=0 \
            GIT_ASKPASS="$askpass_script" \
            MIRROR_USERNAME="$mirror_username" \
            MIRROR_PASSWORD="$destination_token" \
            git -C "$mirror_dir" push --mirror destination
          fi

      - name: Verify mirrored refs in test mode
        if: ${{ steps.validate.outputs.test_mode == 'true' }}
        env:
          DESTINATION_URL: ${{ steps.validate.outputs.destination_url }}
          TEST_SSH_PRIVATE_KEY: ${{ steps.bootstrap_test_server.outputs.test_ssh_private_key }}
          SOURCE_URL_INPUT: ${{ inputs.source-url }}
          SOURCE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          source_url="$SOURCE_URL_INPUT"
          source_auth_token="$SOURCE_AUTH_TOKEN"
          if [[ -z "$source_url" ]]; then
            source_url="${GITHUB_SERVER_URL%/}/${GITHUB_REPOSITORY}.git"
          fi

          mirror_dir="$RUNNER_TEMP/repo-mirror-verify.git"
          rm -rf "$mirror_dir"
          git init --bare "$mirror_dir"

          github_server_url_with_slash="${GITHUB_SERVER_URL%/}/"
          github_basic_auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$source_auth_token" | base64 | tr -d '\n')"
          git -C "$mirror_dir" remote add source "$source_url"
          git -C "$mirror_dir" \
            -c "http.${github_server_url_with_slash}.extraheader=${github_basic_auth_header}" \
            fetch --prune source '+refs/*:refs/*'

          git -C "$mirror_dir" remote add destination "$DESTINATION_URL"

          source_refs="$RUNNER_TEMP/source-refs.txt"
          destination_refs="$RUNNER_TEMP/destination-refs.txt"

          git -C "$mirror_dir" for-each-ref --format='%(objectname) %(refname)' refs | sort > "$source_refs"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 2222 -H 127.0.0.1 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

          test_key_path="$RUNNER_TEMP/mirror-test-verify-key"
          printf '%s\n' "$TEST_SSH_PRIVATE_KEY" > "$test_key_path"
          chmod 600 "$test_key_path"

          GIT_SSH_COMMAND="ssh -i $test_key_path -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            git ls-remote destination | awk '$2 ~ /^refs\// {print $1 " " $2}' | sort > "$destination_refs"

          diff -u "$source_refs" "$destination_refs"
