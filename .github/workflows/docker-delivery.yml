name: Docker Image Continuous Delivery

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        required: false
        default: ${{ github.repository }}
      dockerfile:
        type: string
        required: false
        default: Dockerfile
      stage:
        type: string
        required: false
      build-args:
        type: string
        required: false
      submodules:
        description: >
          true: checkout submodules
          false: don't checkout submodules
          recursive: recursively checkout submodules
        required: false
        default: 'false'
        type: string
      tag-suffix:
        type: string
        required: false
        default: ''
      docker-version:
        type: string
        required: false
        default: latest
    secrets:
      docker-username:
        required: true
      docker-password:
        required: true
      registry-url:
        required: true


defaults:
  run:
    shell: bash


jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: false
      group: docker-push-${{ github.repository }}-${{ inputs.image-name }}-${{ inputs.tag-suffix }}
    defaults:
      run:
        shell: bash
    permissions:
      packages: write
      contents: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - name: Setup Docker
        uses: docker/setup-docker-action@v5
        with:
          version: ${{ inputs.docker-version }}
      - name: Checkout
        id: semver
        uses: EasyDesk/action-semver-checkout@v1
        with:
          submodules: ${{ inputs.submodules }}
      - name: Login to Docker Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.registry-url }}
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ format('{0}/{1}/{2}', secrets.registry-url, secrets.docker-username, inputs.image-name) }}
          tags: |
            type=edge
            type=raw,value=${{ steps.semver.outputs.major }}.${{ steps.semver.outputs.minor }}.${{ steps.semver.outputs.patch }},enable=${{ steps.semver.outputs.should-release }}
            type=raw,value=${{ steps.semver.outputs.major }}.${{ steps.semver.outputs.minor }},enable=${{ steps.semver.outputs.should-release }}
            type=raw,value=${{ steps.semver.outputs.major }},enable=${{ steps.semver.outputs.should-release }}
          labels: |
            maintainer=${{ secrets.docker-username }}
            org.opencontainers.image.title=${{ inputs.image-name }}
          flavor: |
            latest=${{ steps.semver.outputs.should-release }}
            suffix=${{ case(inputs.tag-suffix == '', '', format('-{0}', inputs.tag-suffix)) }},onlatest=true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        if : ${{ steps.meta.outputs.tags != '' }}
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.stage }}
          build-args: ${{ inputs.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
